<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings for that native mobile feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3-in-1 Utility App | Prathamesh Sathe</title>
    <!-- Link to your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Top Navigation / App Header -->
    <header>
        <h1>Utility App</h1>
        <button id="theme-toggle" class="theme-btn">🌙</button>
    </header>

    <!-- Tab Menu for the 3 Tools -->
    <nav class="tab-menu">
        <button class="tab-btn active" onclick="openTab('calc')">Calculator</button>
        <button class="tab-btn" onclick="openTab('bmi')">BMI</button>
        <button class="tab-btn" onclick="openTab('currency')">Currency</button>
    </nav>

    <main>
        <!-- 1. CALCULATOR SECTION -->
        <section id="calc" class="tab-content active">
            <div class="calculator-container">
                <div class="history-display" id="calc-history"></div>
                <div class="main-display" id="calc-display">0</div>
                
                <div class="keypad">
                    <button class="btn clear">C</button>
                    <button class="btn operator">/</button>
                    <button class="btn operator">*</button>
                    <button class="btn operator">-</button>
                    
                    <button class="btn num">7</button>
                    <button class="btn num">8</button>
                    <button class="btn num">9</button>
                    <button class="btn operator">+</button>
                    
                    <button class="btn num">4</button>
                    <button class="btn num">5</button>
                    <button class="btn num">6</button>
                    <button class="btn equals" rowspan="2">=</button>
                    
                    <button class="btn num">1</button>
                    <button class="btn num">2</button>
                    <button class="btn num">3</button>
                    
                    <button class="btn num zero">0</button>
                    <button class="btn num">.</button>
                </div>
            </div>
        </section>

        <!-- 2. BMI CALCULATOR SECTION -->
        <section id="bmi" class="tab-content" style="display: none;">
            <div class="bmi-container">
                <h2>BMI Calculator</h2>
                
                <div class="input-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" placeholder="e.g., 25">
                </div>

                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" placeholder="e.g., 175">
                </div>

                <div class="input-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="e.g., 70">
                </div>

                <button class="action-btn" id="calc-bmi-btn">Calculate BMI</button>

                <div class="result-box" id="bmi-result">
                    <!-- Results will appear here -->
                </div>
            </div>
        </section>

        <!-- 3. CURRENCY CONVERTER SECTION -->
        <section id="currency" class="tab-content" style="display: none;">
            <div class="currency-container">
                <h2>Live Exchange Rates</h2>
                
                <div class="input-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" value="1" placeholder="Enter amount">
                </div>

                <div class="currency-row">
                    <div class="input-group">
                        <label for="from-currency">From</label>
                        <select id="from-currency">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="INR">INR</option>
                            <!-- Add more as needed -->
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label for="to-currency">To</label>
                        <select id="to-currency">
                            <option value="INR">INR</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <!-- Add more as needed -->
                        </select>
                    </div>
                </div>

                <button class="action-btn" id="convert-btn">Convert</button>

                <div class="result-box" id="currency-result">
                    <!-- Results will appear here -->
                </div>
            </div>
        </section>

    </main>

    <!-- OFFICIAL COPYRIGHT FOOTER -->
    <footer style="text-align: center; padding: 20px 10px; font-size: 12px; color: var(--text-color); opacity: 0.6; width: 100%; margin-top: auto;">
        &copy; 2026 Prathamesh Sathe. All rights reserved.
    </footer>

    <!-- Link to your JavaScript -->
    <script src="js/app.js"></script>

    <!-- Simple inline script for the tab switching (You can move this to your app.js) -->
    <script>
        function openTab(tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            event.currentTarget.className += " active";
        }
    </script>
</body>
</html>
