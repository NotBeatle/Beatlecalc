<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Beatle Calc | Native Utility</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
    <div class="app-container">
        <main class="main-content">
            <header class="top-bar">
                <h1 id="currentToolTitle">Standard Calculator</h1>
                <div class="header-controls">
                    <button id="themeToggle" class="icon-btn">🌙</button>
                    <button id="menuToggle" class="icon-btn">☰</button>
                </div>
            </header>

            <div class="workspace">
                <section id="standard" class="tool-section active-tool">
                    <div class="calculator-standard">
                        <div class="display">
                            <div class="history-display" id="calcHistory"></div>
                            <div class="main-display" id="calcDisplay">0</div>
                        </div>
                        <div class="keypad">
                            <button class="key action" data-action="clear">C</button>
                            <button class="key action" data-action="delete">DEL</button>
                            <button class="key operator" data-action="operator" data-val="%">%</button>
                            <button class="key operator" data-action="operator" data-val="/">/</button>
                            
                            <button class="key number" data-val="7">7</button>
                            <button class="key number" data-val="8">8</button>
                            <button class="key number" data-val="9">9</button>
                            <button class="key operator" data-action="operator" data-val="*">×</button>
                            
                            <button class="key number" data-val="4">4</button>
                            <button class="key number" data-val="5">5</button>
                            <button class="key number" data-val="6">6</button>
                            <button class="key operator" data-action="operator" data-val="-">−</button>
                            
                            <button class="key number" data-val="1">1</button>
                            <button class="key number" data-val="2">2</button>
                            <button class="key number" data-val="3">3</button>
                            <button class="key operator" data-action="operator" data-val="+">+</button>
                            
                            <button class="key number zero" data-val="0">0</button>
                            <button class="key number" data-val=".">.</button>
                            <button class="key equals" data-action="calculate">=</button>
                        </div>
                    </div>
                </section>

                <section id="bmi" class="tool-section form-section">
                    <div class="form-calculator">
                        <div style="display: flex; gap: 3vw;">
                            <div class="input-group" style="flex: 1;">
                                <label for="ageInput">Age</label>
                                <input type="number" id="ageInput" placeholder="25">
                            </div>
                            <div class="input-group" style="flex: 1;">
                                <label for="genderSelect">Gender</label>
                                <select id="genderSelect">
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="heightInput">Height (cm)</label>
                            <input type="number" id="heightInput" placeholder="175">
                        </div>
                        <div class="input-group">
                            <label for="weightInput">Weight (kg)</label>
                            <input type="number" id="weightInput" placeholder="70">
                        </div>
                        <button id="calcBmiBtn" class="primary-btn">Calculate BMI</button>
                        <div id="bmiResult" class="result-box"></div>
                    </div>
                </section>

                <section id="currency" class="tool-section form-section">
                    <div class="form-calculator">
                        <div class="input-group">
                            <label for="amountInput">Amount</label>
                            <input type="number" id="amountInput" value="1">
                        </div>
                        <div class="input-group">
                            <label for="fromCurrency">From</label>
                            <select id="fromCurrency"></select>
                        </div>
                        <div class="input-group">
                            <label for="toCurrency">To</label>
                            <select id="toCurrency"></select>
                        </div>
                        <button id="convertCurrencyBtn" class="primary-btn">Convert</button>
                        <div id="currencyResult" class="result-box"></div>
                    </div>
                </section>

                <section id="age-calc" class="tool-section form-section">
                    <div class="form-calculator">
                        <div class="input-group">
                            <label for="dobInput">Date of Birth</label>
                            <input type="text" id="dobInput" placeholder="Select Date">
                        </div>
                        <button id="calcAgeBtn" class="primary-btn">Calculate Age</button>
                        <div id="ageResult" class="result-box" style="text-align: left; line-height: 1.5; font-size: 1.5rem;"></div>
                    </div>
                </section>

                <section id="history" class="tool-section">
                    <div class="history-panel">
                        <ul id="globalHistoryList"></ul>
                        <button id="clearHistoryBtn" class="primary-btn" style="background-color: #ef4444; color: white;">Clear History</button>
                    </div>
                </section>
            </div>
        </main>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <h2>Beatle Calc</h2>
                </div>
                <button id="closeMenuBtn" class="icon-btn">✕</button>
            </div>
            
            <div class="search-container">
                <input type="text" id="toolSearch" placeholder="Search tools...">
            </div>
            
            <nav class="tool-list" id="toolList">
                <button class="nav-btn active" data-target="standard">Standard</button>
                <button class="nav-btn" data-target="bmi">BMI</button>
                <button class="nav-btn" data-target="currency">Currency</button>
                <button class="nav-btn" data-target="age-calc">Age Calculator</button>
            </nav>
            
            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px; padding-top: 20px; border-top: 1px solid var(--border);">
                <button class="nav-btn" data-target="history">History</button>
                
                <button class="nav-btn" onclick="window.location.replace('about.html'); return false;">About</button>
                
                <div style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 15px;">
                    &copy; 2026 Prathamesh Sathe.<br>
                    <a href="#" onclick="window.location.replace('privacy.html'); return false;" style="color: var(--text-main); text-decoration: underline; margin-top: 8px; display: inline-block;">Privacy Policy</a>
                </div>
            </div>
        </aside>
        <div class="overlay" id="overlay"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="js/app.js?v=8"></script>

    <script src="cordova.js"></script>
    <script>
        document.addEventListener("deviceready", function() {
            document.addEventListener("backbutton", function (e) {
                var overlay = document.getElementById('overlay');
                var sidebar = document.getElementById('sidebar');
                
                // Check if the sidebar menu is currently open (checking if overlay is active/visible)
                if (overlay && (overlay.classList.contains('active') || overlay.style.display === 'block')) {
                    // Prevent the app from closing, and just click your existing close button instead
                    e.preventDefault();
                    document.getElementById('closeMenuBtn').click();
                } else {
                    // If the menu is closed and we are on the main app screen, exit the app entirely
                    e.preventDefault();
                    navigator.app.exitApp();
                }
            }, false);
        }, false);
    </script>
</body>
</html>
